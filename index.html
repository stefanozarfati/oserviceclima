<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--b:#F07020;--b2:#FF8C30;--dark:#0a0a0a;--d2:#111;--d3:#1a1a1a;
  --s:rgba(255,255,255,.05);--br:rgba(240,112,32,.22);--t:#e8f5ec;--m:#4a7a5a;--rain:#6ab4e0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--t);font-family:'Raleway',sans-serif;min-height:100vh}
.bg{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(240,112,32,.07),transparent 70%),
  radial-gradient(ellipse 50% 60% at 20% 80%,rgba(106,180,224,.06),transparent 70%),
  linear-gradient(160deg,#0a0a0a,#111118 50%,#0a0a0a)}
.app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:1.4rem 1rem 4rem}
.hdr{display:flex;align-items:center;gap:1rem;margin-bottom:1.8rem}
.logo{width:50px;height:50px;border-radius:13px;background:transparent;border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 20px rgba(240,112,32,.3);overflow:hidden;padding:2px}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:#FF8C30;line-height:1}
.hdr p{font-size:.72rem;color:var(--m);letter-spacing:3px;text-transform:uppercase;margin-top:.2rem}
.srow{position:relative;margin-bottom:.6rem}
.sinp{width:100%;background:var(--d3);border:1.5px solid rgba(240,112,32,.3);border-radius:13px;
  padding:.95rem 3.5rem .95rem 1.2rem;color:var(--t);font-size:1rem;font-family:'Raleway',sans-serif;
  outline:none;transition:.2s}
.sinp:focus{border-color:#F07020;box-shadow:0 0 0 3px rgba(240,112,32,.12)}
.sinp::placeholder{color:var(--m)}
.sbtn{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);background:#F07020;
  border:none;border-radius:9px;width:40px;height:40px;cursor:pointer;font-size:1.1rem}
.sbtn:hover{background:var(--b2)}
.sug{background:var(--d3);border:1px solid var(--br);border-radius:10px;
  margin-bottom:1rem;overflow:hidden;display:none}
.sug.open{display:block}
.si{padding:.7rem 1.1rem;cursor:pointer;font-size:.88rem;
  border-bottom:1px solid rgba(255,255,255,.04);transition:.15s}
.si:last-child{border-bottom:none}
.si:hover{background:rgba(240,112,32,.1)}
.sn{color:var(--t);font-weight:600;font-size:.92rem}
.sd{color:var(--m);font-size:.8rem;margin-top:.1rem}
.card{background:var(--s);border:1px solid var(--br);border-radius:17px;padding:1.2rem;margin-bottom:.8rem;animation:su .35s ease both}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}
.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.2s}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes sp{to{transform:rotate(360deg)}}
.clabel{font-size:.75rem;text-transform:uppercase;letter-spacing:2.5px;color:var(--m);margin-bottom:.85rem;font-weight:700}
.tag-om{display:inline-block;background:rgba(240,112,32,.12);border:1px solid rgba(240,112,32,.3);
  border-radius:6px;padding:.1rem .45rem;font-size:.6rem;color:#FF8C30;vertical-align:middle;margin-left:.4rem}
.hero{display:flex;gap:1rem;align-items:flex-start;flex-wrap:wrap}
.hico{font-size:3.8rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.hloc{font-family:'Playfair Display',serif;font-size:1.45rem;color:#FF8C30;line-height:1.2;margin-bottom:.1rem}
.hreg{font-size:.82rem;color:var(--m);margin-bottom:.4rem}
.htemp{font-size:2.9rem;font-weight:800;line-height:1;letter-spacing:-2px}
.hfeel{font-size:.88rem;color:var(--m);margin-bottom:.3rem}
.hdesc{font-size:1rem;color:#c8beb6;font-style:italic}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(108px,1fr));gap:.45rem;margin-top:.9rem}
.di{background:rgba(0,0,0,.25);border-radius:9px;padding:.6rem .75rem}
.dl{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--m);margin-bottom:.2rem}
.dv{font-size:1rem;font-weight:600}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:4px}
.fcrow{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.3rem}
.fcrow::-webkit-scrollbar{height:3px}
.fcrow::-webkit-scrollbar-thumb{background:rgba(240,112,32,.3);border-radius:2px}
.fcd{flex-shrink:0;flex:1;min-width:90px;background:rgba(0,0,0,.25);border-radius:11px;
  padding:.7rem .4rem;text-align:center;border:1px solid transparent;cursor:pointer;transition:.2s}
.fcd:hover,.fcd.act{background:rgba(240,112,32,.12);border-color:rgba(240,112,32,.4)}
.fcd.t0{background:rgba(240,112,32,.1);border-color:rgba(240,112,32,.3)}
.fcn{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:.3rem}
.fci{font-size:1.8rem;margin-bottom:.2rem}
.fct{font-size:.9rem;font-weight:700}
.fcp{font-size:.72rem;color:var(--m);margin-top:.18rem}
.hscroll{overflow-x:auto;padding-bottom:.3rem}
.hscroll::-webkit-scrollbar{height:3px}
.hscroll::-webkit-scrollbar-thumb{background:rgba(240,112,32,.3);border-radius:2px}
.htable{display:flex;gap:.35rem;min-width:max-content}
.hcol{flex-shrink:0;width:78px;background:rgba(0,0,0,.25);border-radius:10px;padding:.6rem .35rem;text-align:center}
.hcol.now{background:rgba(240,112,32,.15);border:1px solid rgba(240,112,32,.4)}
.htime{font-size:.75rem;font-weight:700;color:#FF8C30;margin-bottom:.22rem}
.hico2{font-size:1.4rem;margin-bottom:.2rem}
.htemp2{font-size:.92rem;font-weight:700}
.hwind{font-size:.68rem;color:var(--m);margin-top:.12rem}
.hrain{font-size:.7rem;color:var(--rain);margin-top:.1rem}
.hprob{font-size:.65rem;color:var(--m)}
.hfoot{font-size:.72rem;color:var(--m);margin-top:.5rem;line-height:1.5}
.cons{background:rgba(34,160,80,.08);border:1px solid rgba(34,160,80,.2);
  border-radius:11px;padding:1rem 1.1rem;font-size:.95rem;color:#90dda0;line-height:1.7}
.errbox{background:rgba(220,60,60,.1);border:1px solid rgba(220,60,60,.25);
  border-radius:12px;padding:1rem;color:#f4a0a0;font-size:.9rem;line-height:1.6}
.ldiv{text-align:center;padding:3rem}
.spin{display:inline-block;width:38px;height:38px;border:3px solid rgba(45,141,224,.15);
  border-top-color:var(--b2);border-radius:50%;animation:sp .9s linear infinite;margin-bottom:.7rem}
.ltxt{font-size:.88rem;color:var(--m);letter-spacing:1px}
.empty{text-align:center;padding:3rem 1rem;color:var(--m);font-size:.95rem;line-height:1.8}
.ebig{font-size:3rem;margin-bottom:.8rem}
.install-banner{display:none;position:fixed;bottom:1rem;left:1rem;right:1rem;
  background:linear-gradient(135deg,#1a1a1a,#222);border:1px solid var(--br);
  border-radius:13px;padding:.85rem 1rem;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);
  align-items:center;gap:.75rem}
.install-banner.visible{display:flex}
.install-banner p{flex:1;font-size:.82rem;line-height:1.4}
.ibtn{background:#F07020;border:none;border-radius:8px;padding:.45rem .85rem;color:#fff;
  font-size:.82rem;font-family:'Raleway',sans-serif;font-weight:600;cursor:pointer}
.dbtn{background:none;border:none;color:var(--m);font-size:1.1rem;cursor:pointer;padding:.2rem}
</style>

  80:"🌧️",81:"🌧️",82:"⛈️",85:"🌨️",86:"❄️",95:"⛈️",96:"⛈️",99:"⛈️"};
const wl=c=>WL[c]||"Variabile", wi=c=>WI[c]||"🌤️";
function pCol(mm){if(!mm||mm<.2)return"#4ade80";if(mm<3)return"#facc15";if(mm<12)return"#fb923c";return"#f87171";}
function wDir(d){return["N","NE","E","SE","S","SO","O","NO"][Math.round((d||0)/45)%8]||"—";}
function fmtT(dt){if(!dt)return"--";const d=new Date(dt);return d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});}
function uvL(u){if(u<3)return"Basso";if(u<6)return"Moderato";if(u<8)return"Alto";if(u<11)return"Molto alto";return"Estremo";}
const DAYS=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"],MONTHS=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
function fmtDay(s,i){if(i===0)return"Oggi";if(i===1)return"Domani";const d=new Date(s);return DAYS[d.getDay()]+" "+d.getDate()+" "+MONTHS[d.getMonth()];}

let hourlyData=null, selDay=0, searchTimer=null;

async function geocode(q){
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=it&addressdetails=1&countrycodes=it`;
    const r=await fetch(url,{headers:{"User-Agent":"OServiceClima/1.0"}});
    const d=await r.json();
    if(d.length) return d;
  }catch(e){}
  try{
    const url2=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=it&format=json`;
    const r2=await fetch(url2);
    const d2=await r2.json();
    if(d2.results?.length) return d2.results.map(p=>{return{lat:String(p.latitude),lon:String(p.longitude),name:p.name,address:{state:p.admin1,country:p.country}}});
  }catch(e){}
  return [];
}

const inp=document.getElementById("inp");
const sug=document.getElementById("sug");
inp.addEventListener("input",()=>{
  clearTimeout(searchTimer);
  const v=inp.value.trim();
  if(v.length<3){sug.classList.remove("open");return;}
  searchTimer=setTimeout(()=>showSug(v),350);
});
inp.addEventListener("keydown",e=>{if(e.key==="Enter"){sug.classList.remove("open");go();}});
document.getElementById("sbtn").addEventListener("click",()=>{sug.classList.remove("open");go();});
document.addEventListener("click",e=>{if(!e.target.closest(".srow")&&!e.target.closest(".sug"))sug.classList.remove("open");});

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

async function showSug(v){
  try{
    const res=await geocode(v);
    if(!res.length){sug.classList.remove("open");return;}
    sug.innerHTML=res.map(r=>{
      const addr=r.address||{};
      const parts=[addr.village||addr.town||addr.city||addr.hamlet||r.name,addr.county||addr.state_district,addr.state||addr.country].filter(Boolean);
      const name=r.name||parts[0]||"";
      const detail=parts.slice(1).join(", ");
      return `<div class="si" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${esc(name)}" data-detail="${esc(detail)}">
        <div class="sn">${esc(name)}</div>
        ${detail?`<div class="sd">${esc(detail)}</div>`:""}
      </div>`;
    }).join("");
    sug.querySelectorAll(".si").forEach(el=>{
      el.addEventListener("click",()=>{
        inp.value=el.dataset.name+(el.dataset.detail?", "+el.dataset.detail:"");
        sug.classList.remove("open");
        fetchWeather(parseFloat(el.dataset.lat),parseFloat(el.dataset.lon),el.dataset.name,el.dataset.detail);
      });
    });
    sug.classList.add("open");
  }catch(e){sug.classList.remove("open");}
}

async function go(){
  const v=inp.value.trim(); if(!v)return;
  loader("Ricerca località...");
  try{
    const res=await geocode(v);
    if(!res.length){showErr(`Località "<b>${v}</b>" non trovata.`);return;}
    const r=res[0];
    const addr=r.address||{};
    const name=r.name||addr.village||addr.town||addr.city||v;
    const detail=[addr.county||addr.state_district,addr.state||addr.country].filter(Boolean).join(", ");
    fetchWeather(parseFloat(r.lat),parseFloat(r.lon),name,detail);
  }catch(e){showErr("Errore: "+e.message);}
}

async function fetchWeather(lat,lon,name,region){
  loader("Caricamento previsioni...");
  selDay=0;
  try{
    const p=new URLSearchParams({
      latitude:lat,longitude:lon,
      current:["temperature_2m","relative_humidity_2m","apparent_temperature","precipitation",
               "weather_code","wind_speed_10m","wind_direction_10m","wind_gusts_10m","visibility","uv_index"].join(","),
      hourly:["temperature_2m","weather_code","wind_speed_10m","wind_direction_10m",
              "precipitation","precipitation_probability","wind_gusts_10m"].join(","),
      daily:["weather_code","temperature_2m_max","temperature_2m_min","precipitation_sum",
             "precipitation_probability_max","wind_speed_10m_max","uv_index_max","sunrise","sunset"].join(","),
      timezone:"auto",forecast_days:7,wind_speed_unit:"kmh"
    });
    const r=await fetch("https://api.open-meteo.com/v1/forecast?"+p);
    hourlyData=await r.json();
    hourlyData._name=name; hourlyData._region=region;
    render();
  }catch(e){showErr("Errore connessione: "+e.message);}
}

function outdoorAdvice(){
  if(!hourlyData)return"";
  const cur=hourlyData.current, d=hourlyData.daily;
  const p=d.precipitation_sum[0]||0, pp=d.precipitation_probability_max[0]||0;
  const w=cur.wind_speed_10m||0, t=cur.temperature_2m||20, wmo=cur.weather_code;
  const parts=[];
  if(p>=15)parts.push("Piogge abbondanti — impermeabile e protezione attrezzature essenziali.");
  else if(p>=4)parts.push("Precipitazioni moderate ("+p.toFixed(1)+" mm) — abbigliamento impermeabile consigliato.");
  else if(p>=.5)parts.push("Possibile pioggerella ("+p.toFixed(1)+" mm) — tieni una giacca a vento.");
  else if(pp>50)parts.push("Alta probabilità di precipitazioni ("+pp+"%) — preparati all'acqua.");
  else parts.push("Tempo asciutto — buone condizioni per il lavoro all'aperto.");
  if([95,96,99].includes(wmo))parts.push("⚡ Temporali in corso: evitare creste e alberi isolati.");
  else if([80,81,82].includes(wmo))parts.push("Rovesci instabili: il tempo può cambiare rapidamente.");
  if(w>55)parts.push("Vento molto forte ("+Math.round(w)+" km/h): attenzione a strutture e stabilità.");
  else if(w>35)parts.push("Vento sostenuto ("+Math.round(w)+" km/h): prudenza in quota.");
  if(t<2)parts.push("Temperature vicino allo zero: rischio ghiaccio, indumenti termici necessari.");
  else if(t<8)parts.push("Mattine fredde: abbigliamento a strati consigliato.");
  else if(t>33)parts.push("Caldo intenso: idratarsi ogni 30 min, limitare esposizione nelle ore centrali.");
  return parts.join(" ");
}

function render(){
  if(!hourlyData)return;
  const cur=hourlyData.current, d=hourlyData.daily;
  const name=hourlyData._name, region=hourlyData._region;
  let fcHtml="";
  for(let i=0;i<Math.min(7,d.time.length);i++){
    const mm=d.precipitation_sum[i], pc=pCol(mm);
    fcHtml+=`<div class="fcd${i===0?" t0":""}${i===selDay?" act":""}" onclick="selectDay(${i})">
      <div class="fcn">${fmtDay(d.time[i],i)}</div>
      <div class="fci">${wi(d.weather_code[i])}</div>
      <div class="fct">${Math.round(d.temperature_2m_min[i])}°/${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fcp"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${pc};vertical-align:middle;margin-right:3px"></span>
      ${mm>0?parseFloat(mm).toFixed(1)+"mm":"Asciutto"}${d.precipitation_probability_max[i]>0?" ("+d.precipitation_probability_max[i]+"%)":""}</div>
    </div>`;
  }
  const vis=cur.visibility!=null?(cur.visibility/1000).toFixed(0)+" km":"—";
  document.getElementById("content").innerHTML=`
  <div class="card">
    <div class="clabel">Condizioni attuali <span class="tag-om">OPEN-METEO</span></div>
    <div class="hero">
      <div class="hico">${wi(cur.weather_code)}</div>
      <div style="flex:1;min-width:148px">
        <div class="hloc">${name}</div>
        <div class="hreg">${region}</div>
        <div class="htemp">${Math.round(cur.temperature_2m)}°<span style="font-size:1.2rem;color:var(--m);font-weight:300">C</span></div>
        <div class="hfeel">Percepita ${Math.round(cur.apparent_temperature)}°C</div>
        <div class="hdesc">${wl(cur.weather_code)}</div>
      </div>
    </div>
    <div class="dgrid">
      <div class="di"><div class="dl">🌡️ Min/Max</div><div class="dv">${Math.round(d.temperature_2m_min[0])}°/${Math.round(d.temperature_2m_max[0])}°C</div></div>
      <div class="di"><div class="dl">💧 Umidità</div><div class="dv">${cur.relative_humidity_2m}%</div></div>
      <div class="di"><div class="dl">💨 Vento</div><div class="dv">${wDir(cur.wind_direction_10m)} ${Math.round(cur.wind_speed_10m)} km/h</div></div>
      <div class="di"><div class="dl">💨 Raffiche</div><div class="dv">${Math.round(cur.wind_gusts_10m)} km/h</div></div>
      <div class="di"><div class="dl">🌧️ Precip. oggi</div>
        <div class="dv"><span class="dot" style="background:${pCol(d.precipitation_sum[0])}"></span>
        ${d.precipitation_sum[0]>0?parseFloat(d.precipitation_sum[0]).toFixed(1)+" mm":"Assenti"}</div></div>
      <div class="di"><div class="dl">☀️ UV max</div><div class="dv">${d.uv_index_max[0]} — ${uvL(d.uv_index_max[0])}</div></div>
      <div class="di"><div class="dl">👁️ Visibilità</div><div class="dv">${vis}</div></div>
      <div class="di"><div class="dl">🌅 Alba/Tramonto</div><div class="dv">${fmtT(d.sunrise[0])} / ${fmtT(d.sunset[0])}</div></div>
    </div>
  </div>
  <div class="card">
    <div class="clabel">Previsioni 7 giorni · Tocca per le ore</div>
    <div class="fcrow">${fcHtml}</div>
  </div>
  <div class="card" id="hcard">${renderHourly()}</div>
  <div class="card">
    <div class="clabel">🧭 Consiglio per chi lavora all'aperto</div>
    <div class="cons">${outdoorAdvice()}</div>
  </div>`;
}

function renderHourly(){
  const lbl='<div class="clabel">Ore per ora <span class="tag-om">OPEN-METEO</span></div>';
  if(!hourlyData) return lbl+'<div style="color:var(--m);font-size:.85rem">Nessun dato.</div>';
  const h=hourlyData.hourly,d=hourlyData.daily;
  if(!d?.time||selDay>=d.time.length) return lbl+'<div style="color:var(--m)">Nessun dato.</div>';
  const dayDate=d.time[selDay];
  const srH=d.sunrise[selDay]?parseInt(d.sunrise[selDay].substring(11,13)):6;
  const ssH=d.sunset[selDay]?parseInt(d.sunset[selDay].substring(11,13)):20;
  const nowStr=new Date().toISOString().substring(0,13);
  const hours=[];
  for(let i=0;i<h.time.length;i++){
    if(h.time[i].startsWith(dayDate)) hours.push({
      t:h.time[i],hour:parseInt(h.time[i].substring(11,13)),
      temp:h.temperature_2m[i],wmo:h.weather_code[i],
      wind:h.wind_speed_10m[i],dir:h.wind_direction_10m[i],
      gusts:h.wind_gusts_10m[i],precip:h.precipitation[i],prob:h.precipitation_probability[i]
    });
  }
  if(!hours.length) return lbl+'<div style="color:var(--m)">Nessun dato orario.</div>';
  const dayLabel=fmtDay(d.time[selDay],selDay);
  const cols=hours.map(h=>{
    const isNow=h.t.substring(0,13)===nowStr;
    return `<div class="hcol${isNow?" now":""}">
      <div class="htime">${String(h.hour).padStart(2,"0")}:00</div>
      <div class="hico2">${(h.hour<srH||h.hour>=ssH)&&h.wmo===0?"🌙":wi(h.wmo)}</div>
      <div class="htemp2">${Math.round(h.temp)}°</div>
      <div class="hwind">${wDir(h.dir)} ${Math.round(h.wind)}<br><span style="color:#cc4400">↑${Math.round(h.gusts)}</span></div>
      ${h.precip>0?`<div class="hrain">${h.precip.toFixed(1)}mm</div>`:""}
      ${h.prob>0?`<div class="hprob">${h.prob}%</div>`:""}
    </div>`;
  }).join("");
  return lbl+`<div style="font-size:.75rem;color:var(--b2);font-weight:700;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:1.5px">${dayLabel}</div>
    <div class="hscroll"><div class="htable">${cols}</div></div>
    <div class="hfoot">🌅 ${fmtT(d.sunrise[selDay])} · 🌇 ${fmtT(d.sunset[selDay])} · vento km/h · ↑raffiche</div>`;
}

function selectDay(i){
  selDay=i;
  document.querySelectorAll(".fcd").forEach((el,idx)=>el.classList.toggle("act",idx===i));
  const hc=document.getElementById("hcard");
  if(hc){hc.innerHTML=renderHourly();hc.scrollIntoView({behavior:"smooth",block:"nearest"});}
}

function loader(msg){document.getElementById("content").innerHTML=`<div class="ldiv"><div class="spin"></div><div class="ltxt">${msg}</div></div>`;}
function showErr(msg){document.getElementById("content").innerHTML=`<div class="errbox">⚠️ ${msg}</div>`;}

let dP=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dP=e;document.getElementById("banner").classList.add("visible");});
document.getElementById("ibtn").addEventListener("click",async()=>{
  if(dP){dP.prompt();await dP.userChoice;dP=null;}
  document.getElementById("banner").classList.remove("visible");
});
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`const C="osc-v1";
self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));
self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x))))));
self.addEventListener("fetch",e=>{
  if(e.request.url.includes("open-meteo.com")||e.request.url.includes("nominatim")||e.request.url.includes("fonts.gstatic")){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));return;
  }
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
});`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
</body>
</html>
